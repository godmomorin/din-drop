<title>ディン落としゲーム</title>

  ★ Supabaseオンライン順位の設定（ここに自分の値を入れるとオンライン化）★
  未入力でも「その端末のセッション内ランキング」で普通に遊べます。

  1) Supabaseでテーブルを作る:
     create table fruitpon_rankings (
       id bigint generated always as identity primary key,
       name text not null,
       score int not null,
       created_at timestamptz default now()
     );
  2) RLSを有効化して、誰でもinsert/selectできるポリシーを追加:
     alter table fruitpon_rankings enable row level security;
     create policy "read"   on fruitpon_rankings for select using (true);
     create policy "insert" on fruitpon_rankings for insert with check (true);
  3) 下の2つの値を入れる（Project Settings > API）。
==================================================================== -->

<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --silver-hi:#ffffff;
    --silver:#e2e8ef;
    --silver-2:#c4cdd9;
    --silver-3:#a6b1c0;
    --edge:#7d8a9a;
    --ink:#2b3440;
    --ink-soft:#62708020;
    --pop-pink:#ff5d9e;
    --pop-blue:#2fc6ff;
    --pop-yellow:#ffd23c;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; }
  body{
    font-family:"M PLUS Rounded 1c", system-ui, sans-serif;
    background:
      radial-gradient(circle at 50% -8%, #ffffff 0%, #e3e9f0 38%, #bcc7d5 100%);
    color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    user-select:none; touch-action:none;
  }
  #app{
    position:relative; width:100%; max-width:430px; height:100vh; height:100dvh;
    display:flex; flex-direction:column; margin:0 auto;
  }

  /* ---- ヘッダー ---- */
  header{
    flex:0 0 auto; padding:26px 14px 4px;
    display:flex; align-items:flex-end; justify-content:space-between; gap:8px;
  }
  .brand{ display:flex; flex-direction:column; line-height:1; }
  .brand .ja{
    font-family:"Mochiy Pop One", sans-serif;
    font-size:21px; letter-spacing:0.5px; white-space:nowrap;
    background:linear-gradient(180deg,#ffffff 0%,#b5c0cf 52%,#8694a4 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 1px 0 #fff) drop-shadow(0 2px 2px rgba(40,55,75,.3));
  }
  .brand .sub{ font-size:10px; color:#7a8696; margin-top:4px; letter-spacing:3px; }
  .score-box{ text-align:right; }
  .score-box .label{ font-size:10px; color:#7a8696; letter-spacing:2px; }
  .score-box .val{
    font-family:"Mochiy Pop One"; font-size:30px; color:#3a4250; line-height:1;
    text-shadow:0 1px 0 #fff, 0 2px 3px rgba(40,55,75,.25);
  }

  /* ---- ゲーム盤 ---- */
  #stage{
    position:relative; flex:1 1 auto; min-height:0;
    display:flex; align-items:center; justify-content:center;
    padding:18px 12px 14px;
  }
  #bottle{
    position:relative;
    background:linear-gradient(180deg,#ffffff 0%, #eef2f6 100%);
    border-radius:20px;
    box-shadow:0 12px 30px rgba(40,55,75,.28),
               inset 0 0 0 3px #ffffff, inset 0 0 0 6px #bcc7d5,
               inset 0 -8px 22px rgba(150,162,178,.18);
    overflow:hidden;
  }
  canvas{ display:block; }
  /* 上部バー */
  #topbar{
    position:absolute; top:10px; left:10px; right:10px;
    display:flex; align-items:flex-start; gap:8px; pointer-events:none;
  }
  #next, #hold, #mission{
    background:rgba(255,255,255,.85);
    border:2px solid #bcc7d5; border-radius:13px;
    padding:5px 9px 4px; display:flex; align-items:center; gap:6px;
    color:#3a4250; font-size:11px; font-weight:800; letter-spacing:1px;
    box-shadow:0 2px 7px rgba(40,55,75,.15); backdrop-filter:blur(2px);
  }
  #mission{ margin-left:auto; border-color:#2fc6ff; }
  #mission span{ color:#0f9bd0; }
  #hold.empty .em{ display:none; }
  #next .em, #hold .em, #mission .em{ width:26px; height:26px; border-radius:50%; object-fit:cover; background:#dfe5ec; }
  #combo{
    position:absolute; top:58px; left:50%; transform:translateX(-50%) scale(.6);
    font-family:"Mochiy Pop One"; color:#ff3d86;
    font-size:22px; opacity:0; text-align:center;
    text-shadow:0 0 10px #ff5d9e55, 0 1px 0 #fff; pointer-events:none; white-space:nowrap;
  }

  /* ---- フッター ---- */
  footer{
    flex:0 0 auto; padding:6px 14px 14px;
    display:flex; flex-direction:column; gap:8px; font-size:11px; color:#7a8696;
  }
  .hold-btn{
    width:100%; font-family:"Mochiy Pop One"; font-weight:800; font-size:16px;
    color:#2b3440;
    background:linear-gradient(180deg,#ffffff 0%, #d4dce6 50%, #b8c3d0 100%);
    border:2px solid #ffffff; border-radius:14px; padding:13px 6px;
    box-shadow:0 4px 0 #93a0b0, 0 7px 14px rgba(40,55,75,.3); cursor:pointer;
    transition:transform .07s, box-shadow .07s;
  }
  .hold-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #93a0b0, 0 3px 8px rgba(40,55,75,.3); }
  .chain{ display:flex; align-items:center; gap:2px; font-size:15px; flex-wrap:nowrap; overflow:hidden; }
  .chain span{ opacity:.45; }
  .chain .cimg{ width:20px; height:20px; border-radius:50%; object-fit:cover; opacity:.95; }
  .chain b{ font-size:11px; opacity:.4; padding:0 2px; }

  /* ---- オーバーレイ画面 ---- */
  .screen{
    position:absolute; inset:0; z-index:20;
    background:linear-gradient(180deg, rgba(240,244,249,.96), rgba(198,208,220,.97));
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:28px; gap:18px; backdrop-filter:blur(3px);
    overflow-y:auto; -webkit-overflow-scrolling:touch; justify-content:safe center;
  }
  .screen.hidden{ display:none; }
  .title-em{
    width:118px; height:118px; border-radius:50%; object-fit:cover;
    border:4px solid #ffffff;
    box-shadow:0 8px 22px rgba(40,55,75,.4), inset 0 0 0 2px #bcc7d5;
  }
  .title{
    font-family:"Mochiy Pop One"; font-size:32px; line-height:1.2;
    background:linear-gradient(180deg,#ffffff 0%,#aab6c5 55%,#7e8a9a 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 2px 0 #fff) drop-shadow(0 3px 4px rgba(40,55,75,.3));
  }
  .title small{ display:block; font-size:13px; color:#7a8696; letter-spacing:4px; margin-top:8px; font-family:"M PLUS Rounded 1c"; -webkit-text-fill-color:#7a8696; }
  .how{
    font-size:13px; color:#3a4250; line-height:1.9; max-width:285px;
    background:rgba(255,255,255,.62); border:1px solid #ffffff; border-radius:14px; padding:14px 16px;
    box-shadow:0 4px 12px rgba(40,55,75,.12);
  }
  .how b{ color:#0f9bd0; }
  .btn{
    font-family:"Mochiy Pop One"; font-size:18px; color:#2b3440;
    background:linear-gradient(180deg,#ffffff 0%, #d4dce6 50%, #b8c3d0 100%);
    border:2px solid #ffffff; border-radius:999px; padding:14px 40px;
    box-shadow:0 5px 0 #93a0b0, 0 8px 18px rgba(40,55,75,.3); cursor:pointer;
    transition:transform .08s, box-shadow .08s;
  }
  .btn:active{ transform:translateY(4px); box-shadow:0 1px 0 #93a0b0, 0 3px 8px rgba(40,55,75,.3); }
  .btn.ghost{
    background:rgba(255,255,255,.4); color:#3a4250;
    border:2px solid #aab6c5; box-shadow:none; font-size:14px; padding:10px 26px;
  }
  .btn.ghost:active{ transform:translateY(2px); }
  .btn.shu{
    background:linear-gradient(180deg,#ff8ab8,#ff4f93); color:#fff;
    border:2px solid #ffd0e4; box-shadow:0 5px 0 #d12e6e,0 8px 18px rgba(40,55,75,.25);
  }
  .btn.shu:active{ box-shadow:0 1px 0 #d12e6e,0 3px 8px rgba(40,55,75,.25);}
  .final-score{ font-family:"Mochiy Pop One"; font-size:54px; color:#3a4250; line-height:1; text-shadow:0 1px 0 #fff,0 3px 5px rgba(40,55,75,.2); }
  .final-score small{ display:block; font-size:14px; color:#7a8696; font-family:"M PLUS Rounded 1c"; letter-spacing:3px; }
  .name-row{ display:flex; gap:8px; width:100%; max-width:300px; }
  .name-row input{
    flex:1; font-family:"M PLUS Rounded 1c"; font-weight:700; font-size:16px;
    padding:12px 14px; border-radius:12px; border:2px solid #bcc7d5;
    background:#ffffff; color:#2b3440; outline:none; min-width:0;
  }
  .name-row input::placeholder{ color:#9aa6b6; }
  .rank-mode{ font-size:10px; letter-spacing:1px; color:#7a8696; }
  .rank-mode .on{ color:#16b06a; }

  /* ---- ランキング表 ---- */
  .rank-wrap{ width:100%; max-width:330px; max-height:46vh; overflow-y:auto; }
  .rank-title{ font-family:"Mochiy Pop One"; color:#3a4250; font-size:20px; margin-bottom:10px; text-shadow:0 1px 0 #fff;}
  table.rank{ width:100%; border-collapse:collapse; font-size:14px; }
  table.rank td{ padding:9px 8px; border-bottom:1px solid rgba(40,55,75,.12); }
  table.rank .pos{ width:34px; font-family:"Mochiy Pop One"; color:#8b97a6; }
  table.rank .pos.g{ color:#e6b422; } table.rank .pos.s{ color:#8b97a6; } table.rank .pos.b{ color:#c8825a; }
  table.rank .nm{ text-align:left; color:#2b3440; font-weight:700; word-break:break-all;}
  table.rank .sc{ text-align:right; font-family:"Mochiy Pop One"; color:#0f9bd0; }
  table.rank tr.me td{ background:rgba(47,198,255,.14); }
  .rank-loading{ color:#7a8696; font-size:13px; padding:20px; }

  /* 上部操作バー */
  .ctrlbar{ flex:0 0 auto; display:flex; visibility:hidden; align-items:center; gap:8px; padding:4px 14px 0; }
  .ctrl-btn{ font-family:"M PLUS Rounded 1c"; font-weight:800; font-size:13px; color:#2b3440;
    background:linear-gradient(180deg,#fff,#cfd8e2); border:2px solid #fff; border-radius:10px;
    padding:7px 12px; box-shadow:0 3px 0 #93a0b0,0 4px 8px rgba(40,55,75,.25); cursor:pointer; }
  .ctrl-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #93a0b0; }
  .ctrl-btn.armed{ background:linear-gradient(180deg,#ff8ab8,#ff4f93); color:#fff; border-color:#ffd0e4; }
  #timer{ font-family:"Mochiy Pop One"; font-size:18px; color:#3a4250; margin:0 auto; display:none; }
  #timer.warn{ color:#e23b6d; }
  #homeWarn{ display:none; font-size:11px; color:#e23b6d; font-weight:800; }
  /* 音量パネル */
  .sound-panel{ position:absolute; inset:0; z-index:30; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px; padding:30px;
    background:linear-gradient(180deg,rgba(240,244,249,.97),rgba(198,208,220,.98)); backdrop-filter:blur(3px); }
  .sound-panel.hidden{ display:none; }
  .sound-row{ width:100%; max-width:300px; }
  .sound-row label{ display:block; font-weight:800; color:#3a4250; margin-bottom:8px; }
  .sound-row input[type=range]{ width:100%; height:30px; accent-color:#ff4f93; }
  .bgm-picker{ display:flex; gap:8px; flex-wrap:wrap; }
  .bgm-btn{ flex:1 1 0; min-width:38px; font-family:"M PLUS Rounded 1c"; font-weight:800; font-size:16px;
    color:#2b3440; background:linear-gradient(180deg,#fff,#cfd8e2); border:2px solid #fff; border-radius:12px;
    padding:10px 0; box-shadow:0 3px 0 #93a0b0,0 4px 8px rgba(40,55,75,.2); cursor:pointer; }
  .bgm-btn:active{ transform:translateY(2px); box-shadow:0 1px 0 #93a0b0; }
  .bgm-btn.on{ color:#fff; background:linear-gradient(180deg,#ff8ab8,#ff4f93); border-color:#ffd0e4; box-shadow:0 3px 0 #c83a72; }
  /* 確認 */
  .confirm{ position:absolute; inset:0; z-index:30; display:flex; align-items:center; justify-content:center; padding:30px; background:rgba(13,24,48,.5); backdrop-filter:blur(2px); }
  .confirm.hidden{ display:none; }
  .confirm-box{ background:#fff; border-radius:18px; padding:24px; text-align:center; max-width:300px; box-shadow:0 12px 30px rgba(0,0,0,.3); }
  .confirm-box p{ color:#2b3440; font-weight:800; margin:0 0 18px; line-height:1.6; }
  .confirm-row{ display:flex; gap:10px; }
  /* モード選択 */
  .mode-row{ display:flex; flex-direction:column; gap:10px; width:100%; max-width:300px; }
  /* ランキングタブ */
  .rank-tabs{ display:flex; gap:6px; margin-bottom:0; }
  .rank-tabs .tab{ flex:1; font-family:"M PLUS Rounded 1c"; font-weight:800; font-size:12px;
    color:#5d6b7e; background:rgba(255,255,255,.5); border:2px solid #bcc7d5; border-radius:10px 10px 0 0;
    padding:8px 4px; cursor:pointer; }
  .rank-tabs .tab.on{ color:#fff; background:linear-gradient(180deg,#3ec6ff,#1f9bd0); border-color:#1f9bd0; }
  .home-rank-wrap{ width:100%; max-width:330px; max-height:32vh; overflow-y:auto;
    background:rgba(255,255,255,.5); border:2px solid #bcc7d5; border-top:none; border-radius:0 0 12px 12px; padding:6px; }
  .how-toggle{ font-size:12px; color:#1f8fbf; text-decoration:underline; cursor:pointer; }
  .hidden{ display:none; }
</style>
</head>

<div id="app">
  <header>
    <div class="brand">

      <div id="combo"></div>

let voiceBuffers = [];
let lastVoiceAt = 0;
function b64ToArrayBuffer(dataURI){
  const bin = atob(dataURI.split(",")[1]);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
async function loadVoices(){
  const ac = audio();
  for(const src of VOICE_SRCS){
    try{
      const ab = b64ToArrayBuffer(src);
      const buf = await ac.decodeAudioData(ab);
      voiceBuffers.push(buf);
    }catch(e){ console.warn("voice load失敗", e); }
  }
}
function playVoice(){
  const now = performance.now();
  if(now - lastVoiceAt < 140) return;
  if(!voiceBuffers.length) return;
  lastVoiceAt = now;
  const ac = audio();
  const s = ac.createBufferSource();
  s.buffer = voiceBuffers[Math.floor(Math.random()*voiceBuffers.length)];
  s.connect(sfxGain); s.start();
}
const MERGE_BONUS_TABLE = FRUITS.map((_,i)=> (i+1)*(i+2)/2 ); // 合体得点(三角数)

const { Engine, World, Bodies, Body, Events, Composite } = Matter;

/* ---------- DOM ---------- */
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const bottle = document.getElementById("bottle");
const scoreEl = document.getElementById("score");
const nextEmEl = document.getElementById("nextEm");
const holdEm = document.getElementById("holdEm");
const holdBox = document.getElementById("hold");
const holdLabel = document.getElementById("holdLabel");
const missionThumb = document.getElementById("missionThumb");

/* ---------- 盤面サイズ ---------- */
let W, H, DPR, dangerDepth;
function layout(){
  const stage = document.getElementById("stage");
  const availW = Math.min(stage.clientWidth - 24, 406);
  const availH = stage.clientHeight - 32;
  W = Math.min(availW, availH / 1.4);
  H = W * 1.4;
  bottle.style.width = W + "px";
  bottle.style.height = H + "px";
  DPR = Math.min(window.devicePixelRatio || 1, 2.5);
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W + "px"; cv.style.height = H + "px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
  dangerDepth = W * 0.16;
}

/* ---------- 物理ワールド ---------- */
let engine, world, walls = [];
function buildWorld(){
  engine = Engine.create();
  engine.positionIterations = 10;
  engine.velocityIterations = 8;
  world = engine.world;
  applyGravity();
  const t = 60;
  const opt = { isStatic:true, restitution:0, friction:0.95, render:{visible:false} };
  walls = [
    Bodies.rectangle(W/2, H + t/2 - 2, W*3, t, opt),        // 床
    Bodies.rectangle(-t/2 + 2, H/2, t, H*3, opt),           // 左壁
    Bodies.rectangle(W + t/2 - 2, H/2, t, H*3, opt),        // 右壁
  ];
  World.add(world, walls);
}

/* ---------- 重力（下固定） ---------- */
const GRAV_MAG = 1.0;
function applyGravity(){
  engine.gravity.x = 0;
  engine.gravity.y = GRAV_MAG;
}
// 待機玉の位置（上の投入口。t:0..1で左右スライド）
function spawnPos(r, t){
  const off = r + 6, lo = r+2, hi = W-r-2;
  return { x: lo + t*(hi-lo), y: off };
}
function screenToT(px){
  const r = current ? current.r : 20;
  const lo = r+2, hi = W-r-2;
  return Math.max(0, Math.min(1, (px-lo)/(hi-lo)));
}


let fruits = new Set();
const SPECIAL_R = 40;
function makeFruit(x, y, level, asStatic, special){
  const r = special ? SPECIAL_R : FRUITS[level].r;
  const body = Bodies.circle(x, y, r, {
    restitution: 0.02,
    friction: 0.7,
    frictionStatic: 0.9,
    frictionAir: 0.03,
    density: 0.0015,
    isStatic: !!asStatic,
    label: "fruit",
  });
  body.level = level;
  body.r = r;
  body.special = special || null;
  body.merged = false;
  body.spawnAt = performance.now();
  World.add(world, body);
  fruits.add(body);
  return body;
}

/* ---------- ゲーム状態 ---------- */
let state = "ready";        // ready | playing | over
let score = 0;
let current = null;         // 操作中の待機玉
let nextLevel = 0;
let canDrop = true;
let overTimer = 0;
let lastT = 0;
let comboCount = 0, comboTimer = 0;   // comboCount = 連鎖数
let playerName = "";
// ホールド
let heldLevel = null, holdUsed = false;
// ミッション
let missionLevel = 4, missionCount = 0;
// 特殊玉の出現率
const WILD_RATE = 0.07;
// モード・タイムアタック
let gameMode = "normal";              // "normal" | "timeattack"
const TA_DURATION = 5*60*1000;        // 5分
let taEndAt = 0;

function rndDropLevel(){ return Math.floor(Math.random()* (DROP_MAX_LEVEL+1)); }

function newGame(mode){
  gameMode = mode || "normal";
  for(const b of fruits) World.remove(world, b);
  fruits.clear();
  score = 0; overTimer = 0; comboCount = 0;
  heldLevel = null; holdUsed = false; missionCount = 0;
  applyGravity();
  scoreEl.textContent = "0";
  state = "playing";
  nextLevel = rndDropLevel();
  setMission(true);
  updateHoldUI();
  spawnCurrent();
  // タイマー
  taEndAt = (gameMode==="timeattack") ? performance.now() + TA_DURATION : 0;
  updateTimerUI();
  // BGM
  const ac = audio(); if(ac.state==="suspended") ac.resume();
  startBGM();
  // 上部バー表示
  document.getElementById("ctrlbar").style.visibility = "visible";
  resetHomeBtn();
}

function updateTimerUI(){
  const el = document.getElementById("timer");
  if(gameMode!=="timeattack" || state!=="playing"){ el.style.display="none"; return; }
  el.style.display="block";
  const left = Math.max(0, taEndAt - performance.now());
  const s = Math.ceil(left/1000);
  el.textContent = "⏱ " + Math.floor(s/60) + ":" + String(s%60).padStart(2,"0");
  el.classList.toggle("warn", s<=30);
}

function rollSpecial(){
  return Math.random() < WILD_RATE ? "wild" : null;
}

function spawnCurrent(forced){
  let lv, special=null;
  if(forced != null){          // ホールドから取り出し
    lv = forced;
  } else {
    lv = nextLevel;
    nextLevel = rndDropLevel();
    nextEmEl.src = FRUITS[nextLevel].src;
    special = rollSpecial();
  }
  const t = 0.5;
  const r = special ? SPECIAL_R : FRUITS[lv].r;
  const p = spawnPos(r, t);
  current = makeFruit(p.x, p.y, lv, true, special);
  current.slideT = t;
  current.isHeld = true;
  canDrop = true;
}

function dropCurrent(){
  if(!current || !canDrop) return;
  Body.setStatic(current, false);
  current.isHeld = false;
  current.spawnAt = performance.now();
  current = null;
  canDrop = false;
  holdUsed = false;            // 次の玉でまたホールド可
  comboCount = 0; comboTimer = 0;  // 新しい手で連鎖リセット
  setTimeout(()=>{ if(state==="playing") spawnCurrent(); }, 520);
}

function holdAction(){
  if(state!=="playing" || !current || !canDrop || holdUsed) return;
  if(current.special) return;  // 特殊玉はホールド不可
  const cur = current.level;
  World.remove(world, current); fruits.delete(current); current = null;
  if(heldLevel == null){ heldLevel = cur; spawnCurrent(); }
  else { const h = heldLevel; heldLevel = cur; spawnCurrent(h); }
  holdUsed = true;
  updateHoldUI();
  sfxHold();
}

function updateHoldUI(){
  if(heldLevel == null){ holdBox.classList.add("empty"); holdLabel.textContent = "ホールド"; }
  else { holdBox.classList.remove("empty"); holdEm.src = FRUITS[heldLevel].src; holdLabel.textContent = ""; }
}

function moveCurrentTo(px, py){
  if(!current) return;
  const r = current.r;
  const t = screenToT(px);
  current.slideT = t;
  Body.setPosition(current, spawnPos(r, t));
}

/* ---------- 合体処理 ---------- */
let pendingMerges = [], pendingBombs = [], pendingWild = [];
Events && Events.on; // guard
function setupCollision(){
  Events.on(engine, "collisionStart", (ev)=>{
    for(const pair of ev.pairs){
      const a = pair.bodyA, b = pair.bodyB;
      if(a.label!=="fruit" || b.label!=="fruit") continue;
      if(a.merged || b.merged) continue;
      if(a.isHeld || b.isHeld) continue;
      const sa = a.special, sb = b.special;
      // ボム：着地して何かに触れたら爆発
      if(sa==="bomb" || sb==="bomb"){
        const bomb = sa==="bomb" ? a : b;
        if(!bomb.merged){ bomb.merged = true; pendingBombs.push(bomb); }
        continue;
      }
      // オールマイディン：相手と合体して1段上げる（最大ディンには効かない）
      if(sa==="wild" || sb==="wild"){
        const wild = sa==="wild" ? a : b;
        const other = wild===a ? b : a;
        if(other.special) continue;       // 特殊同士は無視
        if(other.level >= MAX_LEVEL) continue;  // 最大ディンは消せない（すり抜けて温存）
        a.merged = b.merged = true;
        pendingWild.push([wild, other]);
        continue;
      }
      // 通常合体
      if(a.level !== b.level) continue;
      a.merged = b.merged = true;
      pendingMerges.push([a,b]);
    }
  });
}

function resolveMerges(){
  resolveBombs();
  resolveWild();
  if(!pendingMerges.length) return;
  const list = pendingMerges; pendingMerges = [];
  bumpChain();
  for(const [a,b] of list){
    if(!fruits.has(a) || !fruits.has(b)) continue;
    const lv = a.level;
    const mx = (a.position.x + b.position.x)/2;
    const my = (a.position.y + b.position.y)/2;
    World.remove(world, a); World.remove(world, b);
    fruits.delete(a); fruits.delete(b);
    burst(mx, my, FRUITS[Math.min(lv+1,MAX_LEVEL)].color);
    sfxPop(lv); playVoice();
    if(lv >= MAX_LEVEL){
      addScore(Math.round(300 * chainMult()));
      flashCombo("ポンッ！MAX");
    } else {
      const nf = makeFruit(mx, my, lv+1, false);
      Body.setVelocity(nf, { x:0, y:0 });
      addScore(Math.round(MERGE_BONUS_TABLE[lv+1] * chainMult()));
      checkMission(lv+1);
    }
  }
}

/* ボム：周囲の玉をまとめて消す */
function resolveBombs(){
  if(!pendingBombs.length) return;
  const list = pendingBombs; pendingBombs = [];
  for(const bomb of list){
    if(!fruits.has(bomb)) continue;
    const bx = bomb.position.x, by = bomb.position.y;
    const R = bomb.r * 3.4;
    World.remove(world, bomb); fruits.delete(bomb);
    burst(bx,by,"#ff8a3c"); burst(bx,by,"#ffd23c");
    sfxBomb();
    let gained = 0;
    for(const o of [...fruits]){
      if(o.isHeld) continue;
      const d = Math.hypot(o.position.x-bx, o.position.y-by);
      if(d < R + o.r){
        gained += o.special ? 6 : (o.level+1);
        burst(o.position.x, o.position.y, o.special ? "#fff" : FRUITS[o.level].color);
        World.remove(world, o); fruits.delete(o);
      }
    }
    addScore(40 + gained*8);
    flashCombo("BOMB!");
  }
}

/* ワイルド：触れた玉を1段上げる */
function resolveWild(){
  if(!pendingWild.length) return;
  const list = pendingWild; pendingWild = [];
  let any = false;
  for(const [wild, other] of list){
    if(!fruits.has(wild) || !fruits.has(other)) continue;
    const lv = other.level;
    const mx = (wild.position.x + other.position.x)/2;
    const my = (wild.position.y + other.position.y)/2;
    World.remove(world, wild); World.remove(world, other);
    fruits.delete(wild); fruits.delete(other);
    burst(mx,my,"#ffffff"); sfxPop(lv); playVoice();
    if(lv >= MAX_LEVEL){ addScore(Math.round(300*chainMult())); flashCombo("WILD MAX!"); }
    else {
      const nf = makeFruit(mx, my, lv+1, false);
      Body.setVelocity(nf, { x:0, y:0 });
      addScore(Math.round(MERGE_BONUS_TABLE[lv+1]*chainMult()));
      checkMission(lv+1);
    }
    any = true;
  }
  if(any) bumpChain();
}

/* ---------- 連鎖 ---------- */
function chainMult(){ return 1 + Math.max(0, comboCount-1)*0.5; }  // 1連鎖=1.0,2連鎖=1.5...
function bumpChain(){
  comboCount++;
  comboTimer = 1000;
  if(comboCount >= 2) flashCombo(comboCount + "れんさ ×" + chainMult().toFixed(1));
}

/* ---------- お題ミッション ---------- */
function setMission(reset){
  if(reset) missionLevel = 4;
  else {

    missionLevel = nx;
  }
  updateMissionUI();
}
function checkMission(level){
  if(level === missionLevel){
    missionCount++;
    const bonus = 300 + missionCount*100;
    addScore(bonus);
    flashCombo("お題クリア +" + bonus);
    sfxMission();
    setMission(false);

}
function updateMissionUI(){

}

function addScore(n){
  score += n;
  scoreEl.textContent = score.toLocaleString();
}

/* ---------- 擬似 転がり摩擦（低速の玉だけ横滑りを止める） ---------- */
const ROLL_SPEED   = 5;     // この速度より遅い玉にブレーキ（大きいほど早く止まる）
const ROLL_DAMP_X  = 0.93;  // 横速度の残し率（小さいほど強いブレーキ）
const ROLL_DAMP_ANG= 0.8;   // 回転の残し率
function applyRollingFriction(){
  for(const b of fruits){
    if(b.isHeld) continue;
    const v = b.velocity;
    if(Math.hypot(v.x, v.y) < ROLL_SPEED){
      Body.setVelocity(b, { x: v.x*ROLL_DAMP_X, y: v.y });
      Body.setAngularVelocity(b, b.angularVelocity*ROLL_DAMP_ANG);
    }
  }
}

    comboEl.style.transition = "all .5s ease";
    comboEl.style.opacity = "0";
    comboEl.style.transform = "translateX(-50%) scale(.85) translateY(-12px)";
  });
}

/* ---------- パーティクル ---------- */
let particles = [];
function burst(x,y,color){
  const n = 9;
  for(let i=0;i<n;i++){
    const a = (Math.PI*2*i/n) + Math.random()*0.5;
    const sp = 2 + Math.random()*3.5;
    particles.push({ x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-1, life:1, color, r:2+Math.random()*3 });
  }
}
function updateParticles(dt){
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.25; p.life-=dt/600;
  }
  particles = particles.filter(p=>p.life>0);
}

/* ---------- 効果音・BGM(Web Audio) ---------- */
let actx, sfxGain, bgmGain;
let bgmVol = 0.18, sfxVol = 0.7;
try{ const v=JSON.parse(localStorage.getItem("dindrop_vol")||"null"); if(v){ bgmVol=v.bgm; sfxVol=v.sfx; } }catch(e){}
function saveVol(){ try{ localStorage.setItem("dindrop_vol", JSON.stringify({bgm:bgmVol,sfx:sfxVol})); }catch(e){} }
function audio(){
  if(!actx){
    actx = new (window.AudioContext||window.webkitAudioContext)();
    sfxGain = actx.createGain(); sfxGain.gain.value = sfxVol; sfxGain.connect(actx.destination);
    bgmGain = actx.createGain(); bgmGain.gain.value = bgmVol; bgmGain.connect(actx.destination);
  }
  return actx;
}
function setBgmVol(v){ bgmVol=v; if(bgmGain) bgmGain.gain.value=v; saveVol(); }
function setSfxVol(v){ sfxVol=v; if(sfxGain) sfxGain.gain.value=v; saveVol(); }
function tone(freq, dur, type="sine", gain=0.18){
  try{
    const a = audio(); const o = a.createOscillator(); const g = a.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(gain, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+dur);
    o.connect(g); g.connect(sfxGain);
    o.start(); o.stop(a.currentTime+dur);
  }catch(e){}
}
/* ---- BGM（6曲・番号と曲を直結／ランダム連続再生） ---- */
let bgmBuffers = [], bgmIndex = 0, bgmSource = null, bgmOn = false;
let bgmLoaded = false, bgmLoading = null;
async function loadBGM(){
  if(bgmLoaded) return;
  if(bgmLoading) return bgmLoading;
  bgmLoading = (async ()=>{
    const ac = audio();
    bgmBuffers = new Array(BGM_SRCS.length).fill(null);  // 番号を固定（失敗してもズレない）
    for(let i=0; i<BGM_SRCS.length; i++){
      try{
        const r = await fetch(BGM_SRCS[i]);
        if(!r.ok) throw new Error(r.status);
        bgmBuffers[i] = await ac.decodeAudioData(await r.arrayBuffer());
      }catch(e){ console.warn("bgm load失敗:", BGM_SRCS[i], e); }
    }
    bgmLoaded = true;
  })();
  return bgmLoading;
}
function validBgmIndices(){ return bgmBuffers.map((b,i)=> b?i:-1).filter(i=> i>=0); }
function startBGM(){
  const valid = validBgmIndices();
  if(!valid.length) return;
  bgmOn = true;
  bgmIndex = valid[Math.floor(Math.random()*valid.length)];
  playBGMTrack();
}
function playBGMTrack(){
  if(!bgmOn) return;
  const valid = validBgmIndices();
  if(!valid.length) return;
  if(!bgmBuffers[bgmIndex]) bgmIndex = valid[Math.floor(Math.random()*valid.length)];
  const ac = audio();
  bgmSource = ac.createBufferSource();
  bgmSource.buffer = bgmBuffers[bgmIndex];
  bgmSource.connect(bgmGain);
  bgmSource.onended = ()=>{ if(bgmOn){
    const v = validBgmIndices();
    if(v.length){
      let n = bgmIndex;
      if(v.length > 1){ do{ n = v[Math.floor(Math.random()*v.length)]; }while(n===bgmIndex); }
      bgmIndex = n;
    }
    playBGMTrack();
  } };
  try{ bgmSource.start(); }catch(e){}
}
function stopBGM(){
  bgmOn = false;
  if(bgmSource){ try{ bgmSource.onended=null; bgmSource.stop(); }catch(e){} bgmSource=null; }
}
async function selectBGM(i){
  const ac = audio();
  if(ac.state === "suspended"){ try{ await ac.resume(); }catch(e){} }
  await loadBGM();
  if(!bgmBuffers[i]){ console.warn("曲", i+1, "は読み込めていません"); return; }
  bgmOn = true;
  bgmIndex = i;
  if(bgmSource){ try{ bgmSource.onended=null; bgmSource.stop(); }catch(e){} bgmSource=null; }
  playBGMTrack();
  document.querySelectorAll("#bgmPicker .bgm-btn").forEach((b,idx)=> b.classList.toggle("on", idx===i));
}
function sfxPop(lv){
  const base = 220 + lv*55;
  tone(base, 0.12, "triangle", 0.2);
  tone(base*1.5, 0.10, "sine", 0.12);
}
function sfxDrop(){ tone(160,0.08,"sine",0.12); }
function sfxBomb(){ tone(90,0.25,"sawtooth",0.22); setTimeout(()=>tone(60,0.3,"square",0.18),40); }
function sfxMission(){ tone(660,0.1,"triangle",0.16); setTimeout(()=>tone(880,0.14,"triangle",0.16),90); setTimeout(()=>tone(1170,0.16,"triangle",0.14),190); }
function sfxHold(){ tone(420,0.07,"sine",0.12); }
function sfxOver(){ tone(200,0.5,"sawtooth",0.15); setTimeout(()=>tone(140,0.6,"sawtooth",0.15),120); }

/* ---------- ゲームオーバー判定 ---------- */
function checkOver(dt){
  let danger = false;
  const now = performance.now();
  for(const b of fruits){
    if(b.isHeld) continue;
    if(now - b.spawnAt < 1200) continue;       // 落下直後は猶予
    const speed = Math.hypot(b.velocity.x, b.velocity.y);
    if(b.position.y - b.r < dangerDepth && speed < 0.6){ danger = true; break; }
  }
  if(danger){ overTimer += dt; } else { overTimer = Math.max(0, overTimer-dt*2); }
  if(overTimer > 1500) gameOver();
}

/* ---------- 描画 ---------- */
function draw(){
  ctx.clearRect(0,0,W,H);

  // 危険ライン
  ctx.save();
  ctx.strokeStyle = "rgba(245,196,81,0.5)";
  ctx.lineWidth = 2; ctx.setLineDash([7,7]);
  ctx.beginPath(); ctx.moveTo(0,dangerDepth); ctx.lineTo(W,dangerDepth);
  ctx.stroke();
  ctx.restore();

  // フルーツ
  for(const b of fruits){
    const {x,y} = b.position;
    const r = b.r;
    ctx.save();
    ctx.translate(x,y);
    if(b.special === "bomb"){
      // ボム玉
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
      ctx.fillStyle = "#23252b"; ctx.fill();
      const g0 = ctx.createRadialGradient(-r*0.35,-r*0.4,r*0.1,0,0,r);
      g0.addColorStop(0,"rgba(255,255,255,0.35)"); g0.addColorStop(1,"rgba(0,0,0,0.3)");
      ctx.fillStyle=g0; ctx.fill();
      ctx.font = (r*1.2)+"px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText("💣", 0, r*0.05);
      ctx.lineWidth=Math.max(2,r*0.06); ctx.strokeStyle="rgba(255,120,60,0.9)";
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
      ctx.restore(); continue;
    }
    if(b.special === "wild"){
      // ワイルド玉（顔写真＋虹フチ）
      ctx.save();
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
      if(wildImg.complete && wildImg.naturalWidth){
        ctx.drawImage(wildImg, -r, -r, r*2, r*2);
      } else { ctx.fillStyle="#5b6fd6"; ctx.fillRect(-r,-r,r*2,r*2); }
      ctx.restore();
      // 光沢
      const gw = ctx.createRadialGradient(-r*0.35,-r*0.4,r*0.1,0,0,r);
      gw.addColorStop(0,"rgba(255,255,255,0.3)"); gw.addColorStop(1,"rgba(0,0,0,0.2)");
      ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle=gw; ctx.fill();
      // 虹フチ（ワイルドの目印）
      const grad = ctx.createLinearGradient(-r,-r,r,r);
      ["#ff4d4d","#ffb24d","#ffe24d","#4dff88","#4dc3ff","#b24dff"].forEach((c,i,a)=>grad.addColorStop(i/(a.length-1),c));
      ctx.lineWidth = Math.max(3, r*0.12); ctx.strokeStyle = grad;
      ctx.beginPath(); ctx.arc(0,0,r-ctx.lineWidth/2,0,Math.PI*2); ctx.stroke();
      ctx.restore(); continue;
    }
    const f = FRUITS[b.level];
    // 地色玉
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.fillStyle = f.color; ctx.fill();
    // 写真（円でクリップ）
    ctx.save();
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
    const fim = fruitImgs[b.level];
    if(fim && fim.complete && fim.naturalWidth){
      ctx.drawImage(fim, -r, -r, r*2, r*2);
    }
    ctx.restore();
    // 光沢
    const g = ctx.createRadialGradient(-r*0.35,-r*0.4,r*0.1,0,0,r);
    g.addColorStop(0,"rgba(255,255,255,0.30)");
    g.addColorStop(0.55,"rgba(255,255,255,0.02)");
    g.addColorStop(1,"rgba(0,0,0,0.22)");
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fillStyle = g; ctx.fill();
    // フチ
    ctx.lineWidth = Math.max(1.5, r*0.05);
    ctx.strokeStyle = "rgba(255,255,255,0.55)";
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }

  // 待機玉の落下ガイド
  if(current && state==="playing"){
    const r = current.r;
    ctx.save();
    ctx.strokeStyle="rgba(255,255,255,0.25)"; ctx.lineWidth=2; ctx.setLineDash([4,6]);
    ctx.beginPath();
    ctx.moveTo(current.position.x, current.position.y + r);
    ctx.lineTo(current.position.x, H);
    ctx.stroke();
    ctx.restore();
  }

  // パーティクル
  for(const p of particles){
    ctx.globalAlpha = Math.max(0,p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/* ---------- メインループ ---------- */
function loop(t){
  lastT = t;
  const dt = 16.667;  // 固定タイムステップで挙動を安定化
  if(state==="playing"){
    Engine.update(engine, dt);
    applyRollingFriction();
    resolveMerges();
    updateParticles(dt);
    checkOver(dt);
    if(comboTimer>0){ comboTimer-=dt; if(comboTimer<=0) comboCount=0; }
    if(gameMode==="timeattack"){
      updateTimerUI();
      if(performance.now() >= taEndAt){ gameOver(); }
    }
  }
  draw();
  requestAnimationFrame(loop);
}

function gameOver(){
  if(state!=="playing") return;
  state = "over";
  stopBGM();
  sfxOver();
  document.getElementById("ctrlbar").style.visibility = "hidden";
  document.getElementById("finalScore").textContent = score.toLocaleString();
  document.getElementById("overMode").textContent = (gameMode==="timeattack") ? "5分タイムアタック" : "通常モード";
  document.getElementById("nameInput").value = playerName;
  document.getElementById("overScreen").classList.remove("hidden");
}

/* ギブアップ */
function giveUp(){
  if(state!=="playing") return;
  gameOver();
}

let homeArmed = false, homeTimer = null;

/* ---------- 入力 ---------- */
function localXY(e){
  const rect = cv.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (W / rect.width),
    y: (e.clientY - rect.top)  * (H / rect.height)
  };
}
let pointerDown = false;
cv.addEventListener("pointerdown", e=>{
  if(state!=="playing") return;
  pointerDown = true; const p = localXY(e); moveCurrentTo(p.x, p.y);
});
cv.addEventListener("pointermove", e=>{
  if(state!=="playing" || !pointerDown) return;
  const p = localXY(e); moveCurrentTo(p.x, p.y);
});
window.addEventListener("pointerup", e=>{
  if(state!=="playing"){ pointerDown=false; return; }
  if(pointerDown){ sfxDrop(); dropCurrent(); }
  pointerDown = false;
});

/* =========================================================
   ランキング（Supabase or オフライン）
========================================================= */
let sb = null, online = false;
function initRanking(){
  const url = window.SUPABASE_URL, key = window.SUPABASE_ANON_KEY;
  if(url && key && window.supabase){
    try{ sb = window.supabase.createClient(url,key); online = true; }catch(e){ online=false; }
  }
  const txt = online ? '<span class="on">●</span> オンライン順位' : '○ オフライン（保存にはSupabase設定が必要）';
  document.querySelectorAll(".rank-mode").forEach(el=> el.innerHTML = txt);
}
let offlineRanks = { normal:[], timeattack:[] };
async function saveScore(name, sc, mode){
  playerName = name;
  if(online){
    try{
      const { error } = await sb.from(window.RANKING_TABLE).insert({ name, score: sc, mode });
      if(error) throw error;
      return true;
    }catch(e){ console.warn("save失敗→オフライン", e); }
  }
  (offlineRanks[mode] || (offlineRanks[mode]=[])).push({ name, score: sc });
  return false;
}
async function fetchTop(mode){
  if(online){
    try{
      const { data, error } = await sb.from(window.RANKING_TABLE)
        .select("name,score").eq("mode",mode).order("score",{ascending:false}).limit(20);
      if(error) throw error;
      return data || [];
    }catch(e){ console.warn("取得失敗→オフライン", e); }
  }
  return [...(offlineRanks[mode]||[])].sort((a,b)=>b.score-a.score).slice(0,20);
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
async function renderRankInto(wrap, mode, myScore){
  wrap.innerHTML = '<div class="rank-loading">読み込み中…</div>';
  const rows = await fetchTop(mode);
  if(!rows.length){ wrap.innerHTML = '<div class="rank-loading">まだ記録がありません。<br>一番乗りを目指そう！</div>'; return; }
  let html = '<table class="rank">';
  rows.forEach((r,i)=>{
    const cls = i===0?"g":i===1?"s":i===2?"b":"";
    const medal = i<3 ? ["🥇","🥈","🥉"][i] : (i+1);
    const me = (myScore!=null && r.score===myScore && r.name===playerName) ? "me":"";
    html += `<tr class="${me}"><td class="pos ${cls}">${medal}</td><td class="nm">${escapeHtml(r.name)}</td><td class="sc">${Number(r.score).toLocaleString()}</td></tr>`;
  });
  html += "</table>";
  wrap.innerHTML = html;
}
let homeRankMode = "normal";
function showHomeRanking(){
  document.querySelectorAll("#rankTabs .tab").forEach(t=>{
    t.classList.toggle("on", t.dataset.mode===homeRankMode);
  });
  renderRankInto(document.getElementById("homeRankWrap"), homeRankMode, null);
}
function goHome(){
  document.getElementById("overScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
  showHomeRanking();
}

/* ---------- 画面遷移 ---------- */
function beginGame(mode){
  const ac = audio();
  if(ac.state === "suspended") ac.resume();
  loadVoices();
  document.getElementById("startScreen").classList.add("hidden");
  newGame(mode);
  loadBGM().then(()=>{ if(state==="playing" && !bgmOn) startBGM(); });
}
document.getElementById("playNormalBtn").onclick = ()=> beginGame("normal");
document.getElementById("playTaBtn").onclick = ()=> beginGame("timeattack");
document.getElementById("holdBtn").onclick = holdAction;

// 上部バー
document.getElementById("homeBtn").onclick = homeTap;
document.getElementById("giveupBtn").onclick = ()=>{
  if(state!=="playing") return;
  document.getElementById("giveupConfirm").classList.remove("hidden");
};
document.getElementById("giveupYes").onclick = ()=>{
  document.getElementById("giveupConfirm").classList.add("hidden");
  giveUp();
};
document.getElementById("giveupNo").onclick = ()=>{
  document.getElementById("giveupConfirm").classList.add("hidden");
};

// 音量パネル
const soundPanel = document.getElementById("soundPanel");
function openSound(){
  document.getElementById("bgmRange").value = Math.round(bgmVol*100);
  document.getElementById("sfxRange").value = Math.round(sfxVol*100);
  soundPanel.classList.remove("hidden");
}
document.getElementById("soundBtn").onclick = openSound;
document.getElementById("soundBtn2").onclick = ()=>{ audio(); openSound(); };
document.getElementById("soundClose").onclick = ()=> soundPanel.classList.add("hidden");
document.getElementById("bgmRange").addEventListener("input", e=> setBgmVol(e.target.value/100));
document.getElementById("sfxRange").addEventListener("input", e=> setSfxVol(e.target.value/100));
document.querySelectorAll("#bgmPicker .bgm-btn").forEach(b=>{
  b.onclick = ()=> selectBGM(parseInt(b.dataset.i, 10));
});

// ランキングタブ（トップ）
document.querySelectorAll("#rankTabs .tab").forEach(t=>{
  t.onclick = ()=>{ homeRankMode = t.dataset.mode; showHomeRanking(); };
});

// 遊び方の開閉
document.getElementById("howToggle").onclick = ()=>{
  document.getElementById("howBox").classList.toggle("hidden");
};

// ゲームオーバー画面
document.getElementById("saveBtn").onclick = async (e)=>{
  const name = (document.getElementById("nameInput").value || "ななし").trim().slice(0,12);
  e.target.disabled = true; e.target.textContent = "…";
  await saveScore(name, score, gameMode);
  homeRankMode = gameMode;
  e.target.disabled = false; e.target.textContent = "登録";
  goHome();
};
document.getElementById("retryBtn").onclick = ()=>{
  document.getElementById("overScreen").classList.add("hidden");
  beginGame(gameMode);
};
document.getElementById("overHomeBtn").onclick = goHome;

/* ---------- 起動 ---------- */
function start(){
  layout(); buildWorld(); setupCollision(); renderChain(); initRanking();
  showHomeRanking();
  lastT = performance.now();
  requestAnimationFrame(loop);
}
window.addEventListener("resize", ()=>{
  // 盤サイズ変化に追随（簡易：再レイアウト＋壁再構築）
  const wasPlaying = state;
  layout();
  // 壁だけ作り直し
  for(const w of walls) World.remove(world, w);
  const t=60, opt={isStatic:true,restitution:0,friction:0.95};
  walls=[
    Bodies.rectangle(W/2,H+t/2-2,W*3,t,opt),
    Bodies.rectangle(-t/2+2,H/2,t,H*3,opt),
    Bodies.rectangle(W+t/2-2,H/2,t,H*3,opt),
  ];
  World.add(world,walls);
});
start();
</script>
</body>
